<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терминал - {{ session_data.course_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Подключаем xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <!-- Подключаем Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .terminal-container {
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
        }
        .terminal-header {
            background: #0a1f0a;
            padding: 15px 20px;
            border-bottom: 2px solid #00ff41;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .terminal-body {
            flex: 1;
            background: #000;
            padding: 10px;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
        }
        .terminal-info-bar {
            background: #0a1f0a;
            padding: 10px 20px;
            border-top: 1px solid #00ff41;
            font-size: 12px;
            color: #00ff41;
        }
        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-connected {
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }
        .status-disconnected {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }
        .status-connecting {
            background: #ffaa00;
            box-shadow: 0 0 10px #ffaa00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-message {
            color: #00ff41;
            font-family: monospace;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div>
                <h2 style="margin: 0;">{{ session_data.course_title }}</h2>
                <small>
                    <span id="connectionStatus" class="connection-status status-disconnected"></span>
                    VM ID: {{ session_data.pve_vm_id }} | Node: {{ session_data.pve_node }}
                </small>
            </div>
            <a href="{{ url_for('view_course', course_id=session_data.course_id) }}" class="btn btn-small">Завершить сессию</a>
        </div>

        <div class="terminal-body">
            <div id="terminal"></div>
            <div id="loading" class="loading-message" style="display: none;">Подключение к терминалу...</div>
        </div>
        <div class="terminal-info-bar">
            ⚠️ Терминал подключён к контейнеру Proxmox VE (VM {{ session_data.pve_vm_id }}) через SSH. Все изменения сохраняются в изолированной среде.
        </div>
    </div>

    <script>
        // Получаем данные из шаблона
        const vmId = {{ session_data.pve_vm_id }};
        const node = '{{ session_data.pve_node }}';
        const sessionToken = '{{ session_token }}';

        let term = null;
        let fitAddon = null;
        let socket = null;
        let isConnected = false;

        // Обновляем статус подключения
        function updateStatus(status) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.classList.remove('status-connected', 'status-disconnected', 'status-connecting');

            switch(status) {
                case 'connected':
                    statusEl.classList.add('status-connected');
                    isConnected = true;
                    document.getElementById('loading').style.display = 'none';
                    break;
                case 'disconnected':
                    statusEl.classList.add('status-disconnected');
                    isConnected = false;
                    break;
                case 'connecting':
                    statusEl.classList.add('status-connecting');
                    isConnected = false;
                    break;
            }
        }

        // Инициализация терминала
        function initTerminal() {
            updateStatus('connecting');
            document.getElementById('loading').style.display = 'block';

            try {
                // Создаем экземпляр xterm.js
                term = new Terminal({
                    cursorBlink: true,
                    fontSize: 14,
                    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                    theme: {
                        background: '#000000',
                        foreground: '#00ff41',
                        cursor: '#00ff41',
                        cursorAccent: '#000000',
                        selection: 'rgba(0, 255, 65, 0.3)',
                        black: '#000000',
                        red: '#ff4444',
                        green: '#00ff41',
                        yellow: '#ffaa00',
                        blue: '#0066ff',
                        magenta: '#ff00ff',
                        cyan: '#00ffff',
                        white: '#ffffff'
                    }
                });

                // Добавляем аддоны
                fitAddon = new FitAddon.FitAddon();
                const webLinksAddon = new WebLinksAddon.WebLinksAddon();
                term.loadAddon(fitAddon);
                term.loadAddon(webLinksAddon);

                // Открываем терминал в DOM
                term.open(document.getElementById('terminal'));
                fitAddon.fit();

                // Обработка изменения размера окна
                window.addEventListener('resize', () => {
                    fitAddon.fit();
                    if (socket && socket.connected) {
                        socket.emit('terminal_resize', {
                            session_token: sessionToken,
                            cols: term.cols,
                            rows: term.rows
                        });
                    }
                });

                // Подключаемся к Socket.IO серверу
                socket = io();

                socket.on('connect', () => {
                    console.log('Connected to Socket.IO server');
                    // Инициализируем терминальную сессию
                    socket.emit('terminal_init', { session_token: sessionToken });
                });

                socket.on('terminal_output', (data) => {
                    if (data.output) {
                        term.write(data.output);
                        updateStatus('connected');
                    }
                    if (data.error) {
                        console.error('Terminal error:', data.error);
                        term.write(`\r\n\x1b[31mОшибка: ${data.error}\x1b[0m\r\n`);
                        updateStatus('disconnected');
                    }
                });

                socket.on('disconnect', () => {
                    console.log('Disconnected from Socket.IO server');
                    updateStatus('disconnected');
                    document.getElementById('loading').innerHTML = '<span style="color: #ffaa00;">Отключено. Переподключение...</span>';
                    document.getElementById('loading').style.display = 'block';
                });

                socket.on('connect_error', (error) => {
                    console.error('Socket.IO connection error:', error);
                    document.getElementById('loading').innerHTML = `<span style="color: #ff4444;\">Ошибка подключения: ${error.message}</span>`;
                    updateStatus('disconnected');
                });

                // Обработка ввода пользователя
                term.onData((data) => {
                    if (socket && socket.connected) {
                        socket.emit('terminal_input', {
                            session_token: sessionToken,
                            command: data
                        });
                    }
                });

            } catch (error) {
                console.error('Error initializing terminal:', error);
                document.getElementById('loading').innerHTML = `<span style="color: #ff4444;">Ошибка инициализации: ${error.message}</span>`;
                updateStatus('disconnected');
            }
        }

        // Запускаем при загрузке страницы
        window.addEventListener('load', () => {
            console.log('Initializing terminal...');
            console.log('VM ID:', vmId);
            console.log('Node:', node);
            console.log('Session Token:', sessionToken);
            initTerminal();
        });
    </script>
</body>
</html>
